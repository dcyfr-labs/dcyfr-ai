name: Doc Parity

# Standalone, NON-REQUIRED doc-parity gate. Kept out of ci.yml (the required
# `Validate` job) so a docs/codegen failure never blocks a code-only PR. The
# paths filter lives INSIDE the job (never on the `on:` trigger) so the job
# always reports a status -- safe to promote to required later via the ruleset.
#
# Ordering matters: the no-build checks (version/exports/env) run against the
# COMMITTED tree BEFORE `build`, because `build`'s prebuild regenerates
# packages/ai/generated/version.ts and would otherwise mask a stale commit. We
# never run `docs:gen` in CI -- the checks regenerate in-memory and compare to
# the committed artifacts.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '24.13.0'

jobs:
  doc-parity:
    name: Doc Parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect parity-relevant changes
        id: changed
        uses: dorny/paths-filter@v4
        with:
          filters: |
            parity:
              - 'packages/ai/**'
              - 'config/**'
              - '.env.example'
              - 'docs/**'
              - '*.md'
              - 'bin/**'
              - 'package.json'
              - 'scripts/gen-version.mjs'
              - 'scripts/doc-parity/**'
              - '.github/workflows/doc-parity.yml'

      - name: Setup Node.js
        if: steps.changed.outputs.parity == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install Dependencies
        if: steps.changed.outputs.parity == 'true'
        run: npm install --ignore-scripts

      # No-build checks run on the committed tree BEFORE build (prebuild would
      # regenerate version.ts and mask a stale commit).
      - name: Check version parity
        if: steps.changed.outputs.parity == 'true'
        run: npm run check:version

      - name: Check export parity
        if: steps.changed.outputs.parity == 'true'
        env:
          # Wave 1: the generated API reference (docs/api/*.md) now documents
          # every public value export across the root + subpath barrels, so the
          # forward under-documented check is promoted to a hard failure.
          DOC_PARITY_EXPORTS: strict
        run: npm run check:exports

      - name: Check env parity
        if: steps.changed.outputs.parity == 'true'
        run: npm run check:env

      - name: Rebuild native modules
        if: steps.changed.outputs.parity == 'true'
        run: npm rebuild better-sqlite3

      - name: Build (required for config parity)
        if: steps.changed.outputs.parity == 'true'
        run: npm run build

      - name: Generated API reference is current
        if: steps.changed.outputs.parity == 'true'
        run: |
          npm run docs:gen:api
          git diff --exit-code -- docs/api || {
            echo "::error::docs/api is out of date -- run 'npm run docs:gen:api' and commit the result.";
            exit 1;
          }

      - name: Check config parity
        if: steps.changed.outputs.parity == 'true'
        run: npm run check:config

      # markdownlint (check:docs) rule-lints docs/**, root *.md, and .github/**
      # -- the same scope lychee link-checks below (Wave 1 task 1.5). The
      # release-please CHANGELOG + GitHub templates get justified rule
      # concessions in .markdownlint.jsonc.
      - name: Lint docs (markdownlint)
        if: steps.changed.outputs.parity == 'true'
        run: npm run check:docs

      # Wave 1 (task 1.2): link-check is now a HARD gate (continue-on-error
      # removed). Resilience flags keep it from flaking on transient external
      # network conditions -- validated against the full tree before the flip:
      #   - GITHUB_TOKEN raises the github.com API rate limit (60->5000/hr/IP).
      #     The docs link ~250 github.com URLs, so an unauthenticated shared
      #     runner would 429 and red the gate -- the dominant flakiness source.
      #   - --max-retries / --retry-wait-time absorb transient 5xx + timeouts.
      #   - --accept treats transient, server-side-but-alive responses as OK:
      #     429 (rate-limited), 408 (request timeout), and 500/502/503/504
      #     (gateway/unavailable). The README's bundlephobia badges + links
      #     (img.shields.io/bundlephobia/... and bundlephobia.com/...) red the
      #     gate whenever bundlephobia is degraded -- observed as a 502 then a
      #     408 on consecutive runs. Those are "alive but transiently failing,"
      #     same class as the existing 429 concession; a genuinely dead link
      #     (DNS/refused/404) still fails. Transient timeouts are also absorbed
      #     by the retries above. Placeholder URLs live in code fences and are
      #     not extracted. (--accept-timeouts is unsupported by the lychee
      #     bundled with lychee-action@v2.)
      - name: Link check
        if: steps.changed.outputs.parity == 'true'
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--no-progress --max-concurrency 4 --max-retries 3 --retry-wait-time 2 --accept 200,206,408,429,500,502,503,504 './docs/**/*.md' './*.md' './.github/**/*.md'"
          fail: true

      - name: No parity-relevant changes
        if: steps.changed.outputs.parity != 'true'
        run: echo "No parity-relevant files changed -- doc-parity satisfied."
