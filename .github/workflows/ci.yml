name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.changeset/**'

permissions: {}

env:
  NODE_VERSION: '24.13.0'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Type Check
        id: typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build

      - name: Test
        id: test
        run: npm run test

      - name: Test (Linear integration)
        id: linear_tests
        run: npm run test -- packages/ai/__tests__/integrations/linear/ --coverage --coverage.thresholds.lines=80

      - name: Check Changeset (PR only)
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Skip for release PRs created by changesets
          if [[ "$HEAD_REF" == "changeset-release/main" ]]; then
            echo "✅ This is a release PR, skipping changeset check"
            exit 0
          fi
          
          # Check if there are changesets in this PR
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          
          if [ "$CHANGESETS" -eq 0 ]; then
            echo "::warning title=Missing Changeset::No changeset found. If this PR includes user-facing changes, run 'npm run changeset' to add one."
          else
            echo "✅ Found $CHANGESETS changeset(s)"
          fi

      - name: Create Summary
        if: always()
        run: |
          echo "## 🔍 Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.test.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
