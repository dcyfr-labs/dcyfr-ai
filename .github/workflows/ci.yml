name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions: {}

env:
  NODE_VERSION: '24.13.0'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Type Check
        id: typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build

      - name: Packaging Smoke Test (bins)
        id: smoke_bins
        # Packs the tarball and installs it into a throwaway consumer to assert
        # every declared bin links and runs --help (guards the 2.1.0–3.2.1
        # stale-bin-target regression class, issue #253).
        run: npm run smoke:bins

      - name: Test
        id: test
        run: npm run test

      - name: Test (Linear integration)
        id: linear_tests
        # Scope coverage to the Linear integration source so the 80% threshold
        # is measured against ~110 lines (linear-client.ts + issue-mapper.ts),
        # not the whole 14k-line packages/ai/ tree (which would always read
        # ~0.7% and fail the gate).
        run: npm run test -- packages/ai/__tests__/integrations/linear/ --coverage --coverage.include='src/integrations/linear/**' --coverage.thresholds.lines=80

      - name: Check Conventional Commit (PR only)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Skip for release PRs created by release-please
          if [[ "$HEAD_REF" == release-please--* ]]; then
            echo "✅ This is a release-please PR, skipping conventional-commit check"
            exit 0
          fi

          # Validate the PR title matches conventional commits.
          # release-please derives version bumps from these, so a non-conforming
          # title means the change won't trigger a release.
          if echo "$PR_TITLE" | grep -qE '^(feat|fix|perf|deps|revert|refactor|docs|test|ci|build|chore|style)(\([a-z0-9_-]+\))?!?: .+'; then
            echo "✅ PR title is a valid conventional commit: $PR_TITLE"
          else
            echo "::warning title=Non-conventional PR title::PR title '$PR_TITLE' does not match conventional commits. release-please needs 'type(scope): subject' to trigger a version bump. See CONTRIBUTING.md."
          fi

      - name: Create Summary
        if: always()
        run: |
          echo "## 🔍 Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bin packaging smoke | ${{ steps.smoke_bins.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.test.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
