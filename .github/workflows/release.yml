name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '24.13.0'
  NPM_CONFIG_PROVENANCE: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Mint GitHub App token
        id: app-token
        # Only mint when org-level RELEASE_APP_ID is set. `continue-on-error`
        # makes the workflow degrade-safe: if the App isn't installed on this
        # repo yet, or secrets are missing, mint fails non-fatally and the
        # fallback chain picks up RELEASE_TOKEN.
        if: ${{ vars.RELEASE_APP_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT with `workflow` scope when available — GITHUB_TOKEN cannot push
          # tags on commits that touch .github/workflows/* (server-side reject).
          # Falls back to GITHUB_TOKEN; degraded mode no-ops the tag push for
          # workflow-touching releases (2026-05-12 missing-v3.0.3 fingerprint).
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Verify npm version and OIDC support
        run: |
          echo "npm version: $(npm --version)"
          NPM_VERSION=$(npm --version)
          NPM_MAJOR=$(echo $NPM_VERSION | cut -d. -f1)
          NPM_MINOR=$(echo $NPM_VERSION | cut -d. -f2)
          if [ "$NPM_MAJOR" -lt 11 ] || ([ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 5 ]); then
            echo "❌ npm version $NPM_VERSION does not support Trusted Publishing (requires >=11.5)"
            exit 1
          fi
          echo "✅ npm $NPM_VERSION supports Trusted Publishing"
          env | grep ACTIONS_ID_TOKEN || echo "⚠️ No OIDC tokens found"

      - name: Install Dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Build Package
        run: npm run build

      - name: Packaging Smoke Test (bins)
        # Packs the tarball and installs it into a throwaway consumer to assert
        # every declared bin links and runs --help — the last gate against the
        # stale-bin-target regression class shipped in 2.1.0–3.2.1 (issue #253).
        # The consumer install runs --ignore-scripts internally, so the unbuilt
        # better-sqlite3 binding is fine for the --help-only paths.
        run: npm run smoke:bins

      - name: Run Tests
        run: npm run test

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create Summary
        run: |
          echo "## 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** \`@dcyfr/ai\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.release-please.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.release-please.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance:** ✅ via OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
