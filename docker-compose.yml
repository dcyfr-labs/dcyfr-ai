# Docker Compose for DCYFR AI Memory Layer
# Provides local Qdrant vector database for development

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: dcyfr-ai-qdrant
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:6333:6333"  # HTTP API — localhost only (prevents Docker→UFW bypass)
      - "127.0.0.1:6334:6334"  # gRPC API — localhost only
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      # API key auth — value injected from workspace .env via op run / docker compose --env-file
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q \"200\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
    driver: local
